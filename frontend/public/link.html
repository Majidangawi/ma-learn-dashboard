<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Majid Angawi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080808; --surface:#141414; --gold:#C9A84C; --ivory:#F5F0E8; --silver:#BBBBBB; --border:rgba(201,168,76,0.14); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--ivory); font-family:'Cairo',sans-serif; min-height:100vh; }
  .wrap { max-width:480px; margin:0 auto; padding:40px 20px 60px; text-align:center; }
  .avatar { width:100px; height:100px; border-radius:50%; border:2px solid var(--gold); margin:0 auto 12px; object-fit:cover; }
  .tagline-ar { color:var(--gold); font-size:1.1rem; font-weight:700; margin-bottom:4px; }
  .tagline-en { color:var(--silver); font-size:.9rem; margin-bottom:28px; }
  .link { display:block; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:12px; color:var(--ivory); text-decoration:none; transition:transform .15s; }
  .link:hover { transform:translateY(-2px); border-color:var(--gold); }
  .link .titleAR { color:var(--gold); font-weight:700; font-size:1rem; }
  .link .titleEN { color:var(--silver); font-size:.8rem; margin-top:2px; }
  .link .icon { float:right; font-size:1.3rem; margin-left:12px; }
  footer { color:var(--silver); font-size:.75rem; margin-top:40px; }
  .lib-newsletter { background:#111; border:1px solid #222; border-radius:10px; padding:14px; margin:16px auto 20px; max-width:500px; text-align:right; }
  .lib-nl-label { color:#C9A84C; font-weight:bold; margin-bottom:8px; }
  .lib-newsletter input[type="text"], .lib-newsletter input[type="email"] { width:100%; background:#0a0a0a; border:1px solid #2a2a2a; color:#eee; padding:10px; border-radius:6px; margin-bottom:8px; font:inherit; }
  .lib-newsletter button { width:100%; background:#C9A84C; color:#0E0E0E; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer; font:inherit; }
  .lib-newsletter button:hover { filter:brightness(1.1); }
  .lib-nl-success { color:#C9A84C; text-align:center; font-weight:bold; padding:14px 0; }
</style>
</head>
<body>
<div class="wrap" id="wrap"><p style="color:var(--silver)">…</p></div>
<script>
  const API = (location.host.startsWith('link-staging.') || location.host.startsWith('linkinbio-staging.'))
    ? 'https://api-staging.malearnsa.com'
    : 'https://api.malearnsa.com';
  const APPS_SCRIPT = '__APPS_SCRIPT_URL__';

  function pickLang() {
    const l = (document.documentElement.lang || 'ar').toLowerCase();
    return l.startsWith('a') ? 'AR' : 'EN';
  }

  function mountNewsletter(wrap) {
    if (localStorage.getItem('ma_nl_subscribed')) return;
    const lang = pickLang();
    const labelText = lang === 'AR' ? 'اشترك في النشرة البريدية' : 'Join the newsletter';
    const namePh = lang === 'AR' ? 'الاسم' : 'Name';
    const emailPh = lang === 'AR' ? 'البريد الإلكتروني' : 'Email';
    const btnText = lang === 'AR' ? 'اشتراك' : 'Subscribe';
    const successText = lang === 'AR' ? '✓ شكراً — أنت في القائمة' : "✓ You're in — check your inbox";
    const section = document.createElement('section');
    section.className = 'lib-newsletter';
    section.id = 'lib-nl';
    section.innerHTML = `
      <div class="lib-nl-body">
        <div class="lib-nl-label">${labelText}</div>
        <input id="lib-nl-name" type="text" placeholder="${namePh}" autocomplete="name" />
        <input id="lib-nl-email" type="email" placeholder="${emailPh}" autocomplete="email" />
        <input type="text" name="website_url" style="display:none" tabindex="-1" autocomplete="off" />
        <button id="lib-nl-submit" type="button">${btnText}</button>
      </div>
      <div class="lib-nl-success" style="display:none">${successText}</div>`;
    const firstLink = wrap.querySelector('a.link');
    if (firstLink) wrap.insertBefore(section, firstLink);
    else wrap.appendChild(section);

    document.getElementById('lib-nl-submit').onclick = async () => {
      const name = document.getElementById('lib-nl-name').value.trim();
      const email = document.getElementById('lib-nl-email').value.trim();
      const honeypot = section.querySelector('input[name="website_url"]').value;
      if (!email) return;
      try {
        const res = await fetch(API + '/api/public/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            email,
            source: 'lib',
            language: lang,
            website_url: honeypot,
          }),
        });
        if (res.ok) {
          section.querySelector('.lib-nl-body').style.display = 'none';
          section.querySelector('.lib-nl-success').style.display = 'block';
          localStorage.setItem('ma_nl_subscribed', '1');
        }
      } catch (e) { /* silent fail — user can retry */ }
    };
  }

  async function init() {
    try {
      const res = await fetch(API + '/api/public/linkbio');
      const { items, header } = await res.json();
      const wrap = document.getElementById('wrap');
      wrap.innerHTML = `
        <img class="avatar" src="${header.photoURL || 'https://majidangawi.com/me.jpg'}" alt="" />
        <div class="tagline-ar">${header.taglineAR}</div>
        <div class="tagline-en">${header.taglineEN}</div>
        ${items.map(i => `
          <a class="link" href="${i.url}" data-id="${i.linkId}" target="_blank" rel="noopener">
            ${i.icon ? `<span class="icon">${i.icon}</span>` : ''}
            <div class="titleAR">${i.titleAR}</div>
            <div class="titleEN">${i.titleEN}</div>
            ${i.description ? `<div style="color:var(--silver);font-size:.78rem;margin-top:4px">${i.description}</div>` : ''}
          </a>`).join('')}
        <footer>© Majid Angawi · majidangawi.com</footer>`;
      mountNewsletter(wrap);
      for (const a of wrap.querySelectorAll('a[data-id]')) {
        a.addEventListener('click', () => {
          if (APPS_SCRIPT && !APPS_SCRIPT.startsWith('__')) {
            navigator.sendBeacon?.(
              APPS_SCRIPT,
              new Blob([new URLSearchParams({ action: 'admin_increment_linkbio_click', link_id: a.dataset.id }).toString()],
                       { type: 'application/x-www-form-urlencoded' }));
          }
        });
      }
    } catch (e) {
      document.getElementById('wrap').innerHTML = `<p style="color:#c66">Temporarily unavailable.</p>`;
    }
  }
  init();
</script>
</body>
</html>
