<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MA Learn — Dashboard</title>
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/primitives.css">
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="css/composer.css">
<link rel="stylesheet" href="css/contacts.css">
<link rel="stylesheet" href="css/lessons.css">
<link rel="stylesheet" href="css/linkbio.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" defer></script>
<style>
  /* Newsletter card grid + tabs */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:14px; }
  .nl-card { background:var(--surface); padding:14px; border-radius:10px; cursor:pointer; border:1px solid transparent; transition:border-color .15s; }
  .nl-card:hover { border-color:#C9A84C; }
  .nl-badge { color:#888; font-size:.8rem; margin-bottom:6px; }
  .nl-subject { font-weight:bold; margin-bottom:10px; }
  .nl-meta { color:var(--silver); font-size:.85rem; line-height:1.5; }
  .tabs button.tab { background:transparent; border:none; color:#888; padding:6px 12px; cursor:pointer; border-bottom:2px solid transparent; }
  .tabs button.tab.active { color:#C9A84C; border-bottom-color:#C9A84C; }
</style>
</head>
<body>
<link rel="stylesheet" href="css/shell.css">
<div id="boot-loader" data-ui="loader-overlay">
  <div data-ui="loader">
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="text"><span>جاري صناعة الإلهام</span></div>
    <div class="line"></div>
  </div>
</div>
<div class="shell" id="shell" style="visibility:hidden">
  <main class="shell-content" id="content"></main>
</div>
<script type="module">
  import { me } from './js/session.js';
  import { mountSidebar } from './js/ui/sidebar-v2.js';
  import { mountTopbar }  from './js/ui/topbar.js';
  import { API_BASE }     from './js/api.js';
  import { startRouter }  from './js/router.js';

  const shell   = document.getElementById('shell');
  const content = document.getElementById('content');

  const side = mountSidebar(shell, { user: 'Majid', env: 'staging' });
  const top  = mountTopbar(shell);

  try { await me(); }
  catch { location.href = 'index.html'; }

  await startRouter({
    content,
    onRouteChange: (pageId) => { side.setActive(pageId); top.setTitle(pageId); },
  });

  // Reveal shell + tear down boot loader
  shell.style.visibility = 'visible';
  const boot = document.getElementById('boot-loader');
  if (boot) boot.remove();

  // Reflect live env on the sidebar foot dot
  fetch(API_BASE + '/health').then(r => r.json()).then(b => {
    const dot = shell.querySelector('.env-dot');
    if (dot) dot.setAttribute('data-env', b.environment || 'staging');
  }).catch(() => {});
</script>
</body>
</html>
