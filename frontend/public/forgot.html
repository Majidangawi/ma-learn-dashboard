<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot password — MA Learn</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-card">
  <h1>Forgot password</h1>
  <p>A reset link will be sent to majed.engawi@gmail.com only.</p>
  <button id="send-btn">Send reset link</button>
  <div class="error" id="msg"></div>
  <a href="index.html" class="forgot">Back to login</a>
</div>
<script type="module">
  import { forgot } from './js/session.js';
  document.getElementById('send-btn').onclick = async () => {
    try {
      await forgot('majed.engawi@gmail.com');
      const msg = document.getElementById('msg');
      msg.className = 'success';
      msg.textContent = 'Check your Gmail. Link expires in 15 minutes.';
    } catch (e) {
      document.getElementById('msg').textContent = 'Error: ' + e.message;
    }
  };
</script>
</body>
</html>
